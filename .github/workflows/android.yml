name: Android CI & Release

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build, sign and upload APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      SIGNING_KEY_BASE64: ${{ secrets.SIGNING_KEY }}
      SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
      SIGNING_STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"
          sdkmanager --list_installed

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission
        run: chmod +x gradlew scripts/check-project.sh

      - name: Run project checks
        run: ./scripts/check-project.sh

      - name: Read project version
        id: metadata
        shell: bash
        run: |
          VERSION="$(sed -n 's/^val appVersion = "\([^"]*\)"/\1/p' app/build.gradle.kts)"
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "apk_path=app/build/outputs/apk/release/TwitterHideAds-v$VERSION.apk" >> "$GITHUB_OUTPUT"

          if [[ "$GITHUB_REF" == refs/tags/v* && "$GITHUB_REF_NAME" != "v$VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version v$VERSION." >&2
            exit 1
          fi

      - name: Check signing configuration
        id: signing
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Pull-request builds are intentionally unsigned because signing secrets are not exposed to PR code."
            exit 0
          fi

          missing=()
          [[ -n "$SIGNING_KEY_BASE64" ]] || missing+=(SIGNING_KEY)
          [[ -n "$SIGNING_KEY_ALIAS" ]] || missing+=(ALIAS)
          [[ -n "$SIGNING_STORE_PASSWORD" ]] || missing+=(STORE_PASSWORD)

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required GitHub Actions secrets: %s\n' "${missing[*]}" >&2
            echo "Add the secrets under Settings > Secrets and variables > Actions." >&2
            exit 1
          fi

          if [[ -z "$SIGNING_KEY_PASSWORD" ]]; then
            echo "KEY_PASSWORD is empty; the workflow will use STORE_PASSWORD for the private key."
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - name: Decode and validate release keystore
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          KEYSTORE="$RUNNER_TEMP/twitterhideads-release.keystore"

          # Accept either a single-line Base64 secret or Base64 copied with line wrapping.
          printf '%s' "$SIGNING_KEY_BASE64" \
            | tr -d '\r\n\t ' \
            | base64 --decode > "$KEYSTORE"
          chmod 600 "$KEYSTORE"

          if [[ ! -s "$KEYSTORE" ]]; then
            echo "SIGNING_KEY decoded to an empty file." >&2
            exit 1
          fi

          echo "Decoded keystore bytes: $(stat -c '%s' "$KEYSTORE")"
          echo "Decoded keystore SHA-256: $(sha256sum "$KEYSTORE" | cut -d' ' -f1)"

          # Verify the decoded keystore, STORE_PASSWORD and ALIAS before Gradle runs.
          # Password values are read from environment variables and are never printed.
          if ! keytool -list -v \
              -keystore "$KEYSTORE" \
              -storepass:env SIGNING_STORE_PASSWORD \
              -alias "$SIGNING_KEY_ALIAS" \
              > "$RUNNER_TEMP/twitterhideads-keystore-info.txt" 2>&1; then
            echo "Keystore validation failed." >&2
            echo "SIGNING_KEY, STORE_PASSWORD and ALIAS must belong to the same keystore." >&2
            echo "Repository secrets are not copied automatically from another repository." >&2
            sed -E \
              -e 's/(password|passphrase).*/\1: [redacted]/Ig' \
              "$RUNNER_TEMP/twitterhideads-keystore-info.txt" >&2 || true
            exit 1
          fi

          grep -E 'Alias name:|Entry type:|Certificate fingerprint \(SHA-256\):|Valid from:' \
            "$RUNNER_TEMP/twitterhideads-keystore-info.txt" || true

      - name: Build unsigned release APK
        run: ./gradlew clean assembleRelease --no-daemon --stacktrace

      - name: Locate unsigned APK
        id: unsigned_apk
        shell: bash
        run: |
          mapfile -t APK_CANDIDATES < <(
            find app/build/outputs/apk/release \
              -maxdepth 1 \
              -type f \
              -name '*.apk' \
              ! -name 'TwitterHideAds-v*.apk' \
              | sort
          )

          if (( ${#APK_CANDIDATES[@]} == 0 )); then
            echo "No release APK was produced." >&2
            find app/build/outputs -maxdepth 5 -type f -print || true
            exit 1
          fi

          echo "path=${APK_CANDIDATES[0]}" >> "$GITHUB_OUTPUT"
          echo "Unsigned APK: ${APK_CANDIDATES[0]}"

      - name: Align and sign release APK
        if: steps.signing.outputs.enabled == 'true'
        id: signed_apk
        shell: bash
        run: |
          BUILD_TOOLS="$ANDROID_SDK_ROOT/build-tools/36.0.0"
          ZIPALIGN="$BUILD_TOOLS/zipalign"
          APKSIGNER="$BUILD_TOOLS/apksigner"
          KEYSTORE="$RUNNER_TEMP/twitterhideads-release.keystore"
          ALIGNED_APK="$RUNNER_TEMP/twitterhideads-aligned.apk"
          TARGET_APK="${{ steps.metadata.outputs.apk_path }}"

          test -x "$ZIPALIGN"
          test -x "$APKSIGNER"
          mkdir -p "$(dirname "$TARGET_APK")"

          "$ZIPALIGN" -f -p 4 "${{ steps.unsigned_apk.outputs.path }}" "$ALIGNED_APK"
          "$ZIPALIGN" -c -p 4 "$ALIGNED_APK"

          export EFFECTIVE_KEY_PASSWORD="${SIGNING_KEY_PASSWORD:-$SIGNING_STORE_PASSWORD}"

          sign_apk() {
            rm -f "$TARGET_APK" "$TARGET_APK.idsig"
            "$APKSIGNER" sign \
              --ks "$KEYSTORE" \
              --ks-key-alias "$SIGNING_KEY_ALIAS" \
              --ks-pass env:SIGNING_STORE_PASSWORD \
              --key-pass env:EFFECTIVE_KEY_PASSWORD \
              --v1-signing-enabled true \
              --v2-signing-enabled true \
              --v3-signing-enabled true \
              --v4-signing-enabled false \
              --out "$TARGET_APK" \
              "$ALIGNED_APK"
          }

          if ! sign_apk; then
            if [[ -n "$SIGNING_KEY_PASSWORD" && "$SIGNING_KEY_PASSWORD" != "$SIGNING_STORE_PASSWORD" ]]; then
              echo "Signing failed with KEY_PASSWORD; retrying with STORE_PASSWORD." >&2
              echo "Android Studio-generated and PKCS12 keystores commonly use the same password for both." >&2
              export EFFECTIVE_KEY_PASSWORD="$SIGNING_STORE_PASSWORD"
              sign_apk
            else
              echo "Signing failed. Check ALIAS, STORE_PASSWORD and KEY_PASSWORD." >&2
              exit 1
            fi
          fi

          test -f "$TARGET_APK"
          "$APKSIGNER" verify --verbose --print-certs "$TARGET_APK"
          echo "path=$TARGET_APK" >> "$GITHUB_OUTPUT"

      - name: Normalize unsigned pull-request APK
        if: steps.signing.outputs.enabled != 'true'
        id: pr_apk
        shell: bash
        run: |
          TARGET_APK="${{ steps.metadata.outputs.apk_path }}"
          mkdir -p "$(dirname "$TARGET_APK")"
          cp "${{ steps.unsigned_apk.outputs.path }}" "$TARGET_APK"
          test -f "$TARGET_APK"
          echo "path=$TARGET_APK" >> "$GITHUB_OUTPUT"
          echo "Unsigned pull-request APK built successfully."

      - name: Select APK output
        id: apk
        shell: bash
        run: |
          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            APK_PATH="${{ steps.signed_apk.outputs.path }}"
          else
            APK_PATH="${{ steps.pr_apk.outputs.path }}"
          fi
          test -f "$APK_PATH"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"

      - name: Upload APK to workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TwitterHideAds-v${{ steps.metadata.outputs.version }}-${{ github.run_number }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Twitter Hide Ads v${{ steps.metadata.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          token: ${{ github.token }}
